services:
  db:
    image: postgres:16-alpine
    container_name: plan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: plan
      POSTGRES_PASSWORD: plan
      POSTGRES_DB: plan
    ports:
      - "5432:5432"
    volumes:
      - plan_pg_data:/var/lib/postgresql/data

volumes:
  plan_pg_data:
